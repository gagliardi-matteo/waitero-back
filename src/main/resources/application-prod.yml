server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  web:
    resources:
      static-locations: file:/app/uploads/

jwt:
  active-secret: ${JWT_ACTIVE_SECRET}
  legacy-secret: ${JWT_LEGACY_SECRET:}
  expiration-ms: 21600000
  refresh-expiration-ms: 604800000

qr:
  token:
    active-secret: ${QR_ACTIVE_SECRET}
    legacy-secret: ${QR_LEGACY_SECRET:}
    expiration: ${QR_TOKEN_EXPIRATION_MS:604800000}

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
  auth:
    client-ids: ${GOOGLE_AUTH_CLIENT_IDS:910347869788-astuldpi4hi3hb0osucuoclhfjdh5dtj.apps.googleusercontent.com}

stripe:
  billing:
    secret-key: ${STRIPE_SECRET_KEY:}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    currency: ${STRIPE_BILLING_CURRENCY:eur}

app:
  privacy:
    hash-secret: ${PRIVACY_HASH_SECRET:${JWT_ACTIVE_SECRET}}
  retention:
    table-access-log-days: ${RETENTION_TABLE_ACCESS_LOG_DAYS:90}
    table-device-days: ${RETENTION_TABLE_DEVICE_DAYS:180}
    event-log-days: ${RETENTION_EVENT_LOG_DAYS:180}
    stripe-webhook-days: ${RETENTION_STRIPE_WEBHOOK_DAYS:90}
    admin-audit-days: ${RETENTION_ADMIN_AUDIT_DAYS:730}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://waitero-front.vercel.app,https://localhost,http://localhost,capacitor://localhost}
  master:
    bootstrap-emails: ${MASTER_BOOTSTRAP_EMAILS:}
  local-login:
    restaurant-bootstrap-password: ${LOCAL_RESTAURATEUR_BOOTSTRAP_PASSWORD:}

