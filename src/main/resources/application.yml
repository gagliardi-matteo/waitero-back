server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/waitero_db
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # usa "validate" o "none" in produzione
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      indent_output: true
jwt:
  active-secret: ${JWT_ACTIVE_SECRET:WaiteroDevJwtSecretKey12345678901234567890}
  legacy-secret: ${JWT_LEGACY_SECRET:}
  expiration-ms: 21600000      # 6 ore
  refresh-expiration-ms: 604800000  # 7 giorni

qr:
  token:
    active-secret: ${QR_ACTIVE_SECRET:WaiteroDevQrSecretKey123456789012345678901}
    legacy-secret: ${QR_LEGACY_SECRET:}
    expiration: ${QR_TOKEN_EXPIRATION_MS:604800000}

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
  auth:
    client-ids: ${GOOGLE_AUTH_CLIENT_IDS:910347869788-astuldpi4hi3hb0osucuoclhfjdh5dtj.apps.googleusercontent.com,910347869788-vh6osb5nv386a6cgc9hpl1vjeq4u9s6v.apps.googleusercontent.com}

stripe:
  billing:
    secret-key: ${STRIPE_SECRET_KEY:}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    currency: ${STRIPE_BILLING_CURRENCY:eur}

openai:
  api:
    key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4.1-mini}

waitero:
  legal:
    contract-version: ${WAITERO_LEGAL_CONTRACT_VERSION:1.0}
    privacy-version: ${WAITERO_LEGAL_PRIVACY_VERSION:1.0}
    terms-version: ${WAITERO_LEGAL_TERMS_VERSION:1.0}
    allergen-disclaimer-version: ${WAITERO_LEGAL_ALLERGEN_DISCLAIMER_VERSION:1.0}
    contract-url: ${WAITERO_LEGAL_CONTRACT_URL:/legal/terms-client-v1.0.html}
    privacy-url: ${WAITERO_LEGAL_PRIVACY_URL:/legal/privacy-client-v1.0.html}
    terms-url: ${WAITERO_LEGAL_TERMS_URL:/legal/terms-client-v1.0.html}
    allergen-disclaimer-url: ${WAITERO_LEGAL_ALLERGEN_DISCLAIMER_URL:/legal/disclaimer-allergeni-v1.0.html}

app:
  privacy:
    hash-secret: ${PRIVACY_HASH_SECRET:WaiteroDevPrivacyHashSecret12345678901234}
  retention:
    table-access-log-days: ${RETENTION_TABLE_ACCESS_LOG_DAYS:90}
    table-device-days: ${RETENTION_TABLE_DEVICE_DAYS:180}
    event-log-days: ${RETENTION_EVENT_LOG_DAYS:180}
    stripe-webhook-days: ${RETENTION_STRIPE_WEBHOOK_DAYS:90}
    admin-audit-days: ${RETENTION_ADMIN_AUDIT_DAYS:730}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://waitero-front.vercel.app,https://localhost,http://localhost,http://localhost:4200,http://localhost:5173,http://localhost:3000,capacitor://localhost}
  master:
    bootstrap-emails: ${MASTER_BOOTSTRAP_EMAILS:}
  local-login:
    restaurant-bootstrap-password: ${LOCAL_RESTAURATEUR_BOOTSTRAP_PASSWORD:}

